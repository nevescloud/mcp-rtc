<meta name="description" content="In-browser AI client calling get_greeting via mcp-rtc. No API key, no vendor — local model via @nevescloud/pip + transformers.js + WebGPU.">

<!-- Front-load the pip local-model bytes during HTML parse instead of
     waiting for the <script type="module"> below to run. preconnect
     opens the TLS sessions to library + model CDNs; modulepreload
     starts pip's bundle in parallel with document load. When the
     bundle's local.esm.js evaluates it fires its own injectNetworkHints
     that adds the transformers.js modulepreload — chain effect. Net:
     pip + transformers + initial HF index race the rest of page boot
     instead of serializing after script-module evaluation. -->

<link rel="preconnect" href="https://huggingface.co" crossorigin>

<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7; --surface: #fff; --surface-2: #fafafc;
    --ink: #1d1d1f; --ink-muted: #6e6e73; --ink-faint: #8e8e93;
    --border: rgba(0,0,0,0.10); --border-soft: rgba(0,0,0,0.06);
    --code-bg: rgba(0,0,0,0.06);
    --accent: #1E40AF; --accent-strong: #1E3A8A; --accent-soft: rgba(30,64,175,0.10);
    --st-idle-fg: #8e8e93;
    --st-connecting-fg: #C97D14; --st-connecting-bg: rgba(232,153,35,0.12);
    --st-ready-fg: #006d51; --st-ready-bg: rgba(0,109,81,0.10);
    --st-error-fg: #C84E00; --st-error-bg: rgba(200,78,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1a1d20; --surface: #262a2e; --surface-2: #21252a;
            --ink: #e9ecef; --ink-muted: #adb5bd; --ink-faint: #6e757c;
            --border: rgba(255,255,255,0.10); --border-soft: rgba(255,255,255,0.06);
            --code-bg: rgba(255,255,255,0.08);
            --accent: #60A5FA; --accent-strong: #93C5FD; --accent-soft: rgba(96,165,250,0.14);
            --st-connecting-fg: #f5b452; --st-connecting-bg: rgba(245,180,82,0.14);
            --st-ready-fg: #66b288; --st-ready-bg: rgba(102,178,136,0.14);
            --st-error-fg: #e57057; --st-error-bg: rgba(229,112,87,0.14); }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }
  body { background: var(--bg); color: var(--ink);
    font: 15px/1.55 system-ui, -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased; }
  header { padding: 0.65rem 1.25rem; border-bottom: 1px solid var(--border);
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    background: var(--surface); }
  .brand { display: flex; align-items: center; gap: 0.55rem;
    color: var(--accent); text-decoration: none; }
  .brand .sig rect { fill: currentColor; }
  .brand .sig path  { stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
  .wordmark { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
  .wordmark .mcp { color: var(--accent); }
  .wordmark .sep { color: var(--ink-faint); margin: 0 0.1em; font-weight: 400; }
  .wordmark .rtc { color: var(--ink); opacity: 0.85; }
  .pagename { font-size: 12px; color: var(--ink-muted);
    padding-left: 0.85rem; border-left: 1px solid var(--border); }
  #site-id { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    background: var(--code-bg); padding: 0.3rem 0.65rem; border-radius: 6px; }
  #status { margin-left: auto; display: inline-flex; align-items: center;
    gap: 0.4rem; font-size: 12px; padding: 0.25rem 0.7rem; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border-soft);
    color: var(--ink-muted); transition: all 0.2s ease; }
  #status.idle       { color: var(--st-idle-fg); }
  #status.connecting { color: var(--st-connecting-fg); background: var(--st-connecting-bg); border-color: transparent; }
  #status.ready      { color: var(--st-ready-fg); background: var(--st-ready-bg); border-color: transparent; }
  #status.error      { color: var(--st-error-fg); background: var(--st-error-bg); border-color: transparent; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  #status.connecting .dot { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.7); } }
  main { flex: 1; padding: 2rem 1.25rem; }
  .container { max-width: 600px; margin: 0 auto; }
  .sig.lg { color: var(--accent); width: 96px; height: 38px;
    margin: 0 auto 1.5rem; display: block; opacity: 0.95; }
  .sig.lg rect { fill: currentColor; }
  .sig.lg path { stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
  .sig.connecting path { stroke-dasharray: 4 3; animation: dash 1.4s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -14; } }
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem 1.5rem; margin: 0 0 1rem; }
  .card.error { border-color: var(--st-error-fg); }
  .card.error h2 { color: var(--st-error-fg); }
  .card h2 { font-size: 16px; margin-bottom: 0.5rem; color: var(--ink); font-weight: 600; }
  .card p { color: var(--ink-muted); font-size: 14px; margin: 0.4rem 0; }
  .card code { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--code-bg); padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 12px; }
  .card a { color: var(--accent); text-decoration: none; }
  .card a:hover { text-decoration: underline; }
  .tools { margin: 0.85rem 0 0.25rem; padding: 0.6rem 0; border-top: 1px solid var(--border-soft); }
  .tool-row { display: flex; align-items: baseline; gap: 0.5rem; padding: 0.35rem 0.25rem; font-size: 13px; }
  .tool-bullet { width: 5px; height: 5px; border-radius: 50%; background: var(--st-ready-fg);
    display: inline-block; flex-shrink: 0; transform: translateY(-2px); }
  .tool-name { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--ink); font-size: 12.5px; }
  .nudge { font-size: 13px; color: var(--ink-muted); margin-top: 0.85rem;
    padding-top: 0.85rem; border-top: 1px solid var(--border-soft); }
  .nudge em { font-style: normal; color: var(--ink); font-weight: 500; }
  .empty-cta { font-size: 13px; color: var(--ink-muted); text-align: center; }
  .empty-cta a { color: var(--accent); text-decoration: none; }
  .empty-cta a:hover { text-decoration: underline; }
  .knock-stage { text-align: center; padding: 1.5rem 0 1rem; }
  .knock-text { font-size: 16px; color: var(--st-connecting-fg); font-weight: 500; min-height: 24px; transition: opacity 0.3s ease; }
  .knock-sub { font-size: 13px; color: var(--ink-muted); margin-top: 0.5rem; }
  .knock-sub code { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--ink); }
  footer { padding: 1.25rem; color: var(--ink-faint); font-size: 12px;
    border-top: 1px solid var(--border-soft); text-align: center; }
  footer a { color: var(--ink-muted); text-decoration: none; margin: 0 0.4rem; }
  footer a:hover { color: var(--ink); }

  /* Pip integration palette — mirrors hatch's design tokens
     (#1D6363 teal accent, ECEEF2 / 2C3039 elevated surfaces, neutral
     ink). pip-core forces `color-scheme: light` on .pip-panel to
     avoid surprising hosts — light-dark() always returns the light
     branch inside pip. We bypass with concrete colors per @media
     block; the .pip-panel override lets pip's internal light-dark()
     fallbacks resolve against the host's color scheme. */
  :root {
    --pip-accent:    #1D6363;
    --pip-on-accent: #ffffff;
    --pip-surface:   #ffffff;
    --pip-ink:       #1A1D23;
    --pip-ink-muted: #5F6368;
    --pip-border:    rgba(0,0,0,0.10);
    --pip-input-bg:  #ECEEF2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --pip-surface:   #22262D;
      --pip-ink:       #E8EAED;
      --pip-ink-muted: #8B9099;
      --pip-border:    rgba(255,255,255,0.10);
      --pip-input-bg:  #2C3039;
    }
  }
  .pip-panel { color-scheme: light dark; }
</style>
<script type="importmap">
{
  "imports": {
    "@nevescloud/mcp-rtc": "https://esm.sh/@nevescloud/mcp-rtc@0.1.1",
    "@modelcontextprotocol/sdk/client/index.js":
      "https://esm.sh/@modelcontextprotocol/sdk@1.29.0/client?external=zod&deps=zod@4.4.3",
    "zod":         "https://esm.sh/zod@4.4.3/es2022/v4/classic/external.mjs",
    "zod/v4":      "https://esm.sh/zod@4.4.3/es2022/v4/classic/external.mjs",
    "zod/v3":      "https://esm.sh/zod@4.4.3/v3",
    "zod/v4-mini": "https://esm.sh/zod@4.4.3/v4-mini",
    "@nevescloud/pip/bundle/local":
      "https://cdn.jsdelivr.net/npm/@nevescloud/pip@3.9.1/bundle/local.esm.js"
  }
}
</script>
</head>
<body>
<header>
  <a class="brand" href="https://neves.cloud/mcp-rtc/">
    <svg class="sig" width="44" height="18" viewBox="0 0 60 24" aria-hidden="true">
      <rect x="2" y="6" width="12" height="12" rx="3"/>
      <rect x="46" y="6" width="12" height="12" rx="3"/>
      <path d="M14 12 q5 -5 11 0 t11 0 t11 0"/>
    </svg>
    <span class="wordmark"><span class="mcp">mcp</span><span class="sep">·</span><span class="rtc">rtc</span></span>
  </a>
  <span class="pagename">client · in-browser AI</span>
  <span id="site-id" hidden></span>
  <span id="status" class="idle" hidden><span class="dot"></span><span id="status-text"></span></span>
</header>
<main><div class="container" id="main"></div></main>
<footer>
  Path A · in-browser inference, no vendor in the loop.·
  <a href="https://github.com/jonasneves/mcp-rtc">github</a>·
  <a href="https://www.npmjs.com/package/@nevescloud/pip">pip</a>·
  <a href="./README.md">readme</a>
</footer>

<script type="module">
import { Client } from '@modelcontextprotocol/sdk/client/index.js';
import { WebRTCClientTransport } from '@nevescloud/mcp-rtc';
import { createPip, createRuntime, local } from '@nevescloud/pip/bundle/local';

// ── site id ─────────────────────────────────────────────────────
// Bare URL fragment: /client.html#hi-XXXXXX. No fragment → empty CTA.
const SITE = (location.hash.replace(/^#/, '') || '').trim();

const main      = document.getElementById('main');
const siteIdEl  = document.getElementById('site-id');
const statusBox = document.getElementById('status');
const statusText = document.getElementById('status-text');

function setStatus(text, kind = 'idle') {
  statusText.textContent = text;
  statusBox.className = kind;
  statusBox.hidden = false;
}

// ── UI states ───────────────────────────────────────────────────
const KNOCKS = ['knock knock', 'anyone home?', 'still knocking', 'psst…', 'any minute now…', 'hmm', 'still here'];

function renderEmpty() {
  main.innerHTML = `
    <svg class="sig lg" viewBox="0 0 60 24" aria-hidden="true">
      <rect x="2" y="6" width="12" height="12" rx="3"/>
      <rect x="46" y="6" width="12" height="12" rx="3"/>
      <path d="M14 12 q5 -5 11 0 t11 0 t11 0"/>
    </svg>
    <p class="empty-cta">No site id in URL. Open this page with <code>#hi-XXXXXX</code><br>(the fragment shown on a running <a href="./hello.html">hello-tool host</a>).</p>
  `;
}

function showConnecting(site) {
  siteIdEl.textContent = site;
  siteIdEl.hidden = false;
  setStatus('connecting', 'connecting');
  main.innerHTML = `
    <svg class="sig lg connecting" viewBox="0 0 60 24" aria-hidden="true">
      <rect x="2" y="6" width="12" height="12" rx="3"/>
      <rect x="46" y="6" width="12" height="12" rx="3"/>
      <path d="M14 12 q5 -5 11 0 t11 0 t11 0"/>
    </svg>
    <div class="knock-stage">
      <div class="knock-text" id="knock-text">${KNOCKS[0]}</div>
      <div class="knock-sub">connecting · <code>${site}</code></div>
    </div>
  `;
  let i = 1;
  const knockEl = document.getElementById('knock-text');
  return setInterval(() => {
    if (!document.body.contains(knockEl)) return;
    knockEl.style.opacity = '0';
    setTimeout(() => { knockEl.textContent = KNOCKS[i % KNOCKS.length]; knockEl.style.opacity = '1'; i++; }, 200);
  }, 2500);
}

function renderReady({ site, tools }) {
  setStatus(`ready · ${tools.length} tool${tools.length === 1 ? '' : 's'}`, 'ready');
  const toolList = tools.length === 0
    ? '<p>(remote peer advertises no tools)</p>'
    : `<div class="tools">${tools.map(t => `
        <div class="tool-row"><span class="tool-bullet"></span><span class="tool-name">${t.name}</span></div>`).join('')}</div>`;
  const sample = tools[0]?.name;
  main.innerHTML = `
    <div class="card">
      <h2>Client mounted.</h2>
      <p>Connected peer-to-peer to <code>${site}</code> over WebRTC. A local model (Google Gemma 4 E2B-it, q4f16) lazy-loads on the first prompt — first run downloads ~3 GB of weights and warms up WebGPU; subsequent runs use the browser cache.</p>
      ${toolList}
      ${sample ? `<p class="nudge">Open the chat bubble (bottom-right) and try <em>/${sample}</em> to dispatch the tool deterministically, or type free text to chat with the local model.</p>` : ''}
    </div>
  `;
}

function renderError(err) {
  const msg = String(err?.message || err);
  const noWebGPU = msg.toLowerCase().includes('webgpu');
  setStatus('error', 'error');
  main.innerHTML = `
    <div class="card error">
      <h2>${noWebGPU ? 'WebGPU not available.' : 'Could not start client.'}</h2>
      <p>${noWebGPU
        ? 'The local model needs WebGPU. Try Chrome / Edge 113+ on a desktop with a recent GPU, or fall back to <a href="./README.md#path-b--claude-code-via-stdio-bridge">Path B</a> (terminal Claude) / <a href="./README.md#path-c--claudeai--claude-desktop-via-webmcp">Path C</a> (browser bridge).'
        : `<code>${msg}</code>`}</p>
    </div>
  `;
}

// ── boot ────────────────────────────────────────────────────────
if (!SITE) {
  renderEmpty();
} else {
  const knockTimer = showConnecting(SITE);
  try {
    // Connect to the host.
    const transport = new WebRTCClientTransport({ siteId: SITE });
    const client = new Client(
      { name: 'hello-tool-client', version: '0.0.1' },
      { capabilities: {} },
    );
    await client.connect(transport);
    const { tools } = await client.listTools();

    clearInterval(knockTimer);
    renderReady({ site: SITE, tools });

    // MCP content blocks → chat-friendly text. Used by both the runtime
    // tool handler (model-driven) and the slash handler (user-driven).
    // Image/audio come back as huge base64 strings that, if dumped as
    // JSON, swamp pip's renderer and visually look like nothing happened.
    function describeContent(blocks) {
      if (!Array.isArray(blocks) || blocks.length === 0) return '(tool returned no content)';
      return blocks.map((c) => {
        if (!c) return '';
        if (c.type === 'text') return c.text || '';
        const kb = c.data ? Math.round((c.data.length * 3 / 4) / 1024) : 0;
        if (c.type === 'image') return `📷 image · ${c.mimeType || 'image/*'} · ~${kb} KB base64`;
        if (c.type === 'audio') return `🎙️ audio · ${c.mimeType || 'audio/*'} · ~${kb} KB base64`;
        if (c.type === 'resource_link') return `🔗 ${c.uri || c.url || '(resource_link)'}`;
        return JSON.stringify(c);
      }).filter(Boolean).join('\n\n');
    }

    async function dispatch(name, args) {
      setStatus('calling tool…', 'connecting');
      try {
        const result = await client.callTool({ name, arguments: args || {} });
        setStatus(`ready · ${tools.length} tool${tools.length === 1 ? '' : 's'}`, 'ready');
        const summary = describeContent(result?.content);
        return result?.isError ? `❌ ${summary}` : summary;
      } catch (err) {
        setStatus('error', 'error');
        return `tool call failed: ${err?.message || err}`;
      }
    }

    // Gemma 4 E2B (instruction-tuned) with Google's standardized sampling.
    // q4f16 over plain q4: smaller download (~1.5 GB decoder vs ~1.9 GB)
    // and faster on WebGPU since activations stay fp16. temperature=1.0 +
    // top_k=64 are Gemma 4's documented defaults; no repetition_penalty
    // per Google. enable_thinking: false suppresses Gemma 4's inline
    // <|channel>thought blocks that would otherwise leak through.
    const provider = local({
      model: 'onnx-community/gemma-4-E2B-it-ONNX',
      dtype: 'q4f16',
      maxTokens: 1024,
      genParams: { temperature: 1.0, top_p: 0.95, top_k: 64 },
      chatTemplate: { enable_thinking: false },
    });

    const systemPrompt = `You are a local in-browser assistant running inside a tab connected to a remote MCP server "${SITE}". You can call any of the tools below to operate on that remote tab. Prefer using a tool over guessing when the user asks something a tool can answer. Keep replies short.`;

    // pip-core 3.8.0 adds prompt-based tool calling to local() — when
    // runtime passes `tools`, the system prompt gets augmented with JSON
    // schemas + emit-format and the streaming parser catches
    // <tool_call>{…}</tool_call> blocks from the model, yielding tool_use
    // events the runtime dispatches. Free chat now auto-routes to a tool
    // call when the model decides one's needed; rt.registerSlash keeps
    // the deterministic /name dispatch path for users who already know.
    const rt = createRuntime({
      provider,
      systemPrompt,
      maxTurns: 4,
      historyLimit: 12,
    });

    for (const tool of tools) {
      rt.registerTool({
        name: tool.name,
        description: tool.description || 'remote tool',
        schema: tool.inputSchema || { type: 'object', properties: {}, required: [] },
        handler: async (input) => dispatch(tool.name, input),
      });
      rt.registerSlash({
        name: tool.name,
        description: (tool.description || 'remote tool').slice(0, 80),
        handler: async () => ({ reply: await dispatch(tool.name, {}) }),
      });
    }

    const pip = createPip({
      introText: `Connected to ${SITE}. Ask the local model, or run a tool directly with /${tools[0]?.name || 'help'}.`,
      placeholder: tools[0] ? `Try /${tools[0].name}, or ask the local model…` : 'Ask the local model…',
      modelLabel: 'gemma-4-E2B-it · q4f16',
      autoOpen: false,
      historyLimit: 6,
      onSubmit:    rt.onSubmit,
      onSlash:     rt.onSlash,
      slashSource: rt.slashSource,
    });

    // Tool-tracing pills — a model-driven call surfaces as a visible
    // artifact in the turn instead of just text in the reply.
    const pills = new Map();
    rt.on('toolCall', ({ turnEl, name, id }) => {
      pills.set(id, pip.appendToolPill(turnEl, name, { label: `${name} …` }));
    });
    rt.on('toolResult', ({ name, ok, result, error, id }) => {
      const pill = pills.get(id);
      pill?.finish({
        label: `${name}${ok ? '' : ' — failed'}`,
        result: ok ? result : undefined,
        error: ok ? undefined : error,
      });
      pills.delete(id);
    });

    // Eager weight download in idle time — provider.warm() shipped in
    // pip-core 3.9.1. Without this the first message pays the full cold
    // start (transformers.js import + tokenizer + ~1.5 GB weights). With
    // this, the page boots, settles, and starts the download while the
    // visitor reads the card; first prompt hits a warm renderer.
    const warmNow = () => provider.warm?.().catch(() => {});
    if (typeof requestIdleCallback === 'function') {
      requestIdleCallback(warmNow, { timeout: 5000 });
    } else {
      setTimeout(warmNow, 1500);
    }

    // Clean up when the page goes away — the lobby drops the registration
    // on connection close, but explicit close keeps the audit trail tidy.
    window.addEventListener('pagehide', () => { try { client.close(); } catch {} });
  } catch (err) {
    clearInterval(knockTimer);
    renderError(err);
  }
}
</script>
</body>
</html>
