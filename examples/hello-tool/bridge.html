<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bridge · mcp-rtc</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7; --ink: #1d1d1f; --ink-muted: #6e6e73;
    --surface: #fff; --border: rgba(0,0,0,0.10); --accent: #006d51;
    --code-bg: rgba(0,0,0,0.06); --warn: #c47c1d; --error: #c4421d;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1a1d20; --ink: #e9ecef; --ink-muted: #adb5bd;
            --surface: #262a2e; --border: rgba(255,255,255,0.10);
            --accent: #66b288; --code-bg: rgba(255,255,255,0.08);
            --warn: #e5a04a; --error: #e57057; }
  }
  body { background: var(--bg); color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, sans-serif;
    margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    background: var(--surface); }
  header h1 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-muted); font-weight: 500; margin: 0; }
  #site-id { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    background: var(--code-bg); padding: 0.3rem 0.65rem; border-radius: 6px; }
  #status { color: var(--ink-muted); font-size: 12px; margin-left: auto; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 0.375rem; vertical-align: middle; }
  .dot.idle  { background: #999; opacity: 0.4; }
  .dot.ok    { background: var(--accent); }
  .dot.warn  { background: var(--warn); }
  .dot.error { background: var(--error); }
  main { flex: 1; min-height: 0; padding: 1rem; overflow-y: auto; }
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem; max-width: 640px;
    margin: 1rem auto; }
  .card h2 { margin: 0 0 0.5rem; font-size: 14px; }
  .card p { margin: 0.5rem 0; color: var(--ink-muted); font-size: 13px; }
  .card code { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--code-bg); padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 12px; }
  .card.error { border-color: var(--error); }
  .card.error h2 { color: var(--error); }
  .tool-list { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    background: var(--code-bg); border-radius: 6px; padding: 0.5rem 0.75rem;
    margin: 0.5rem 0; }
  .tool-list .tool { display: block; padding: 0.15rem 0; }
  .tool-list .tool::before { content: '· '; color: var(--ink-muted); }
</style>
<script type="importmap">
{
  "imports": {
    "@jonasneves/mcp-rtc-bridge-tab": "../../packages/bridge-tab/src/index.mjs",
    "@jonasneves/mcp-rtc":             "../../packages/transport/src/index.mjs",
    "@modelcontextprotocol/sdk/client/index.js":
      "https://esm.sh/@modelcontextprotocol/sdk@1.29.0/client?external=zod&deps=zod@4.4.3",
    "zod":         "https://esm.sh/zod@4.4.3/es2022/v4/classic/external.mjs",
    "zod/v4":      "https://esm.sh/zod@4.4.3/es2022/v4/classic/external.mjs",
    "zod/v3":      "https://esm.sh/zod@4.4.3/v3",
    "zod/v4-mini": "https://esm.sh/zod@4.4.3/v4-mini"
  }
}
</script>
</head>
<body>
  <header>
    <h1>bridge</h1>
    <span id="site-id">…</span>
    <span id="status"><span class="dot idle"></span><span id="status-text">starting…</span></span>
  </header>
  <main id="main">
    <!-- populated by script -->
  </main>

<script type="module">
import { mountBridge } from '@jonasneves/mcp-rtc-bridge-tab';

// ── site id from URL ────────────────────────────────────────────
const url = new URL(location);
const SITE = url.searchParams.get('site');

// ── DOM helpers ─────────────────────────────────────────────────
const siteIdEl = document.getElementById('site-id');
const statusText = document.getElementById('status-text');
const dotEl = document.querySelector('#status .dot');
const main = document.getElementById('main');

function setStatus(text, kind = 'idle') {
  statusText.textContent = text;
  dotEl.className = 'dot ' + kind;
}
function showCard({ title, body, error = false }) {
  main.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card' + (error ? ' error' : '');
  const h2 = document.createElement('h2');
  h2.textContent = title;
  card.appendChild(h2);
  if (typeof body === 'string') {
    const p = document.createElement('p');
    p.innerHTML = body;
    card.appendChild(p);
  } else {
    card.appendChild(body);
  }
  main.appendChild(card);
}

// ── no site id: show usage ──────────────────────────────────────
if (!SITE) {
  siteIdEl.textContent = '(no site)';
  setStatus('idle', 'idle');
  showCard({
    title: 'Add a site id to the URL.',
    body: 'Open this page with <code>?site=&lt;site-id&gt;</code>, where ' +
          '&lt;site-id&gt; is the rendezvous string the remote ' +
          '<code>mcp-rtc</code> server is advertising. Example: ' +
          '<code>?site=hi-abc123</code>.',
  });
} else {
  siteIdEl.textContent = SITE;
  setStatus('connecting…', 'warn');
  try {
    const bridge = await mountBridge({ siteId: SITE });
    setStatus(`bridged — ${bridge.tools.length} tools`, 'ok');
    const list = document.createElement('div');
    list.className = 'tool-list';
    if (bridge.tools.length === 0) {
      list.textContent = '(remote peer advertises no tools)';
    } else {
      for (const t of bridge.tools) {
        const tool = document.createElement('span');
        tool.className = 'tool';
        tool.textContent = t;
        list.appendChild(tool);
      }
    }
    const body = document.createElement('div');
    const p = document.createElement('p');
    p.innerHTML = `Connected to <code>${SITE}</code>. The tools below are now registered with WebMCP. Any local Claude with the Anthropic Chrome extension can call them — try <em>"call ${bridge.tools[0] || 'one of the registered tools'}"</em>.`;
    body.appendChild(p);
    body.appendChild(list);
    showCard({ title: 'Bridge mounted.', body });
  } catch (err) {
    setStatus('error', 'error');
    const lacksWebMCP = String(err.message || err).includes('navigator.modelContext');
    showCard({
      title: lacksWebMCP ? 'WebMCP not available in this browser.' : 'Could not bridge.',
      body: lacksWebMCP
        ? 'This page works in a Chromium-based browser that exposes <code>navigator.modelContext</code> (the W3C-CG WebMCP draft). Chrome 146+ with the Anthropic Claude extension installed is the reference setup.'
        : `<code>${err.message || err}</code>`,
      error: true,
    });
  }
}
</script>
</body>
</html>
